<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Playground | oCamlCase</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/playground">
  <link rel="canonical" href="/playground">
  <script>
    // Unregister any leftover legacy service worker before navigating, so a
    // hard reload of /playground/ heals browsers that still have the broken
    // SW from the BetterOCaml standalone page.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
    location.replace('/playground' + location.search + location.hash);
  </script>
</head>
<body>
  <p>Redirecting to <a href="/playground">/playground</a>…</p>
</body>
</html>
