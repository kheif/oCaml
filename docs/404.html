<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>oCamlCase</title>
    <script>
      // Redirect unknown paths back to the SPA index, preserving the original
      // path in the `p` query param so the bootstrap script in index.html can
      // hand it to React Router via history.replaceState.
      (function () {
        var loc = window.location;
        var path = loc.pathname + loc.search;
        var hash = loc.hash;
        loc.replace(loc.origin + '/?p=' + encodeURIComponent(path) + hash);
      })();
    </script>
  </head>
  <body></body>
</html>
